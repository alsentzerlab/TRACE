<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSONL Text Mapping Visualizer</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;
        
        // Lucide React icons as inline SVG components
        const Upload = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
        );
        
        const ChevronLeft = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        );
        
        const ChevronRight = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        );
        
        const FileText = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
        );
        
        const Bug = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="8" y="6" width="8" height="14" rx="4"></rect>
                <path d="m8 6-2-2"></path>
                <path d="m16 6 2-2"></path>
                <path d="M12 13h0"></path>
                <path d="M12 18h0"></path>
                <path d="M8 10h8"></path>
                <path d="M8 14h8"></path>
            </svg>
        );

        const JSONLVisualizer = () => {
            const [records, setRecords] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [viewMode, setViewMode] = useState('template');
            const [error, setError] = useState('');
            const [showDebug, setShowDebug] = useState(false);

            const colors = [
                '#FFE5E5', '#E5F3FF', '#E5FFE5', '#FFF5E5', '#F5E5FF',
                '#FFE5F5', '#E5FFFF', '#FFFFE5', '#F0F0F0', '#FFE5CC'
            ];

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                try {
                    const text = await file.text();
                    const lines = text.trim().split('\n');
                    const parsed = lines.map(line => JSON.parse(line));
                    
                    setRecords(parsed);
                    setCurrentIndex(0);
                    setError('');
                } catch (err) {
                    setError('Error parsing JSONL file: ' + err.message);
                }
            };

            const generateHighlightedText = (destText, srcTexts, mappings) => {
                if (!mappings || mappings.length === 0) {
                    return { destHtml: [{ text: destText, sources: [] }], srcHtml: [] };
                }

                const boundaries = new Set([0, destText.length]);
                mappings.forEach(m => {
                    boundaries.add(m.start);
                    boundaries.add(m.end);
                });
                const sortedBoundaries = Array.from(boundaries).sort((a, b) => a - b);

                const segments = [];
                for (let i = 0; i < sortedBoundaries.length - 1; i++) {
                    const start = sortedBoundaries[i];
                    const end = sortedBoundaries[i + 1];
                    
                    const coveringSources = mappings
                        .filter(m => m.start <= start && m.end >= end)
                        .map(m => m.src);
                    
                    segments.push({
                        text: destText.slice(start, end),
                        sources: coveringSources
                    });
                }

                const srcHtml = srcTexts.map((srcText, srcIdx) => {
                    const srcMappings = mappings
                        .filter(m => m.src === srcIdx)
                        .sort((a, b) => srcText.indexOf(a.text) - srcText.indexOf(b.text));
                    
                    const parts = [];
                    let lastPos = 0;
                    
                    srcMappings.forEach(mapping => {
                        const pos = srcText.indexOf(mapping.text, lastPos);
                        if (pos >= 0) {
                            if (pos > lastPos) {
                                parts.push({ text: srcText.slice(lastPos, pos), highlight: false });
                            }
                            parts.push({ text: mapping.text, highlight: true, color: colors[srcIdx % colors.length] });
                            lastPos = pos + mapping.text.length;
                        }
                    });
                    
                    if (lastPos < srcText.length) {
                        parts.push({ text: srcText.slice(lastPos), highlight: false });
                    }
                    
                    return { parts, srcIdx };
                });

                return { destHtml: segments, srcHtml };
            };

            const renderDestText = (segments) => {
                return segments.map((segment, idx) => {
                    if (segment.sources.length === 0) {
                        return React.createElement('span', { key: idx }, segment.text);
                    } else if (segment.sources.length === 1) {
                        const color = colors[segment.sources[0] % colors.length];
                        return React.createElement('mark', { 
                            key: idx, 
                            style: { backgroundColor: color, padding: '2px 0', borderRadius: '2px' }
                        }, segment.text);
                    } else {
                        const srcColors = segment.sources.map(s => colors[s % colors.length]);
                        const gradient = `linear-gradient(to right, ${srcColors.join(', ')})`;
                        const srcLabels = segment.sources.map(s => s + 1).join(', ');
                        return React.createElement('mark', {
                            key: idx,
                            style: {
                                background: gradient,
                                padding: '2px 0',
                                borderRadius: '2px',
                                cursor: 'help',
                                borderBottom: '2px dotted rgba(0,0,0,0.3)'
                            },
                            title: `Sources: ${srcLabels}`
                        }, segment.text);
                    }
                });
            };

            const renderSourceText = (srcData) => {
                return srcData.parts.map((part, idx) => {
                    if (!part.highlight) {
                        return React.createElement('span', { key: idx }, part.text);
                    }
                    return React.createElement('mark', {
                        key: idx,
                        style: {
                            backgroundColor: part.color,
                            padding: '2px 0',
                            borderRadius: '2px',
                            borderBottom: '2px solid #666'
                        }
                    }, part.text);
                });
            };

            const currentRecord = records[currentIndex];
            
            let visualization = null;
            let debugInfo = null;
            
            if (currentRecord) {
                const srcTexts = viewMode === 'template' 
                    ? currentRecord.template_string_list 
                    : currentRecord.copyforward_string_list;
                
                const spans = viewMode === 'template'
                    ? currentRecord.template_spans
                    : currentRecord.copyforward_spans;

                // Generate debug info
                debugInfo = {
                    hasFullNoteText: !!currentRecord.full_note_text,
                    fullNoteTextLength: currentRecord.full_note_text?.length || 0,
                    fullNoteTextPreview: currentRecord.full_note_text?.slice(0, 100) || '',
                    hasSrcTexts: !!srcTexts,
                    srcTextsCount: srcTexts?.length || 0,
                    srcTextsPreview: srcTexts?.map((t, i) => `[${i}]: ${t?.slice(0, 50)}...`) || [],
                    hasSpans: !!spans,
                    spansCount: spans?.length || 0,
                    spansData: spans || [],
                    viewMode: viewMode
                };

                if (srcTexts && spans) {
                    visualization = generateHighlightedText(
                        currentRecord.full_note_text,
                        srcTexts,
                        spans
                    );
                }
            }

            return (
                <div className="min-h-screen bg-gray-50 p-8">
                    <div className="max-w-5xl mx-auto">
                        <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
                            <h1 className="text-2xl font-bold text-gray-900 mb-4 flex items-center gap-2">
                                <FileText />
                                JSONL Text Mapping Visualizer
                            </h1>
                            
                            <div className="mb-4">
                                <label className="flex items-center justify-center w-full px-4 py-8 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-colors">
                                    <div className="text-center">
                                        <div className="w-8 h-8 text-gray-400 mx-auto mb-2">
                                            <Upload />
                                        </div>
                                        <span className="text-sm text-gray-600">Click to upload JSONL file</span>
                                    </div>
                                    <input
                                        type="file"
                                        accept=".jsonl,.json"
                                        onChange={handleFileUpload}
                                        className="hidden"
                                    />
                                </label>
                            </div>

                            {error && (
                                <div className="p-4 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
                                    {error}
                                </div>
                            )}

                            {records.length > 0 && (
                                <div className="flex items-center justify-between pt-4 border-t border-gray-200">
                                    <button
                                        onClick={() => setCurrentIndex(Math.max(0, currentIndex - 1))}
                                        disabled={currentIndex === 0}
                                        className="flex items-center gap-1 px-3 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                    >
                                        <ChevronLeft />
                                        Previous
                                    </button>
                                    
                                    <span className="text-sm text-gray-600">
                                        Record {currentIndex + 1} of {records.length}
                                    </span>
                                    
                                    <button
                                        onClick={() => setCurrentIndex(Math.min(records.length - 1, currentIndex + 1))}
                                        disabled={currentIndex === records.length - 1}
                                        className="flex items-center gap-1 px-3 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                    >
                                        Next
                                        <ChevronRight />
                                    </button>
                                </div>
                            )}
                        </div>

                        {currentRecord && (
                            <>
                                <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-4 mb-4">
                                    <div className="flex gap-2">
                                        <button
                                            onClick={() => setViewMode('template')}
                                            className={`flex-1 px-4 py-2 rounded-lg font-medium transition-colors ${
                                                viewMode === 'template'
                                                    ? 'bg-blue-500 text-white'
                                                    : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                            }`}
                                        >
                                            Template View
                                        </button>
                                        <button
                                            onClick={() => setViewMode('copyforward')}
                                            className={`flex-1 px-4 py-2 rounded-lg font-medium transition-colors ${
                                                viewMode === 'copyforward'
                                                    ? 'bg-blue-500 text-white'
                                                    : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                            }`}
                                        >
                                            Copyforward View
                                        </button>
                                        <button
                                            onClick={() => setShowDebug(!showDebug)}
                                            className="px-4 py-2 rounded-lg font-medium bg-yellow-100 text-yellow-800 hover:bg-yellow-200 transition-colors flex items-center gap-1"
                                        >
                                            <Bug />
                                            Debug
                                        </button>
                                    </div>
                                </div>

                                {showDebug && debugInfo && (
                                    <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-4 font-mono text-xs">
                                        <h3 className="font-bold mb-2 text-sm">Debug Information:</h3>
                                        <div className="space-y-1">
                                            <div><strong>View Mode:</strong> {debugInfo.viewMode}</div>
                                            <div><strong>Has full_note_text:</strong> {String(debugInfo.hasFullNoteText)}</div>
                                            <div><strong>full_note_text length:</strong> {debugInfo.fullNoteTextLength}</div>
                                            <div><strong>full_note_text preview:</strong> {debugInfo.fullNoteTextPreview}...</div>
                                            <div><strong>Has source texts:</strong> {String(debugInfo.hasSrcTexts)}</div>
                                            <div><strong>Source texts count:</strong> {debugInfo.srcTextsCount}</div>
                                            <div><strong>Has spans:</strong> {String(debugInfo.hasSpans)}</div>
                                            <div><strong>Spans count:</strong> {debugInfo.spansCount}</div>
                                            {debugInfo.srcTextsPreview.length > 0 && (
                                                <div className="mt-2">
                                                    <strong>Source texts preview:</strong>
                                                    {debugInfo.srcTextsPreview.map((preview, i) => (
                                                        <div key={i} className="ml-4">{preview}</div>
                                                    ))}
                                                </div>
                                            )}
                                            {debugInfo.spansData.length > 0 && (
                                                <div className="mt-2">
                                                    <strong>Spans data:</strong>
                                                    <pre className="ml-4 mt-1 bg-white p-2 rounded overflow-auto max-h-60">
{JSON.stringify(debugInfo.spansData, null, 2)}
                                                    </pre>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {visualization ? (
                                    <>
                                        <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-4">
                                            <h2 className="text-xs font-semibold uppercase tracking-wider text-gray-500 mb-3">
                                                Destination Text
                                            </h2>
                                            <div className="bg-gray-50 p-5 rounded border-l-4 border-gray-800 leading-relaxed">
                                                {renderDestText(visualization.destHtml)}
                                            </div>
                                        </div>

                                        <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                                            <h2 className="text-xs font-semibold uppercase tracking-wider text-gray-500 mb-3">
                                                Source Texts
                                            </h2>
                                            <div className="space-y-4">
                                                {visualization.srcHtml.map((srcData, idx) => (
                                                    <div key={idx} className="bg-gray-50 p-4 rounded border-l-4 border-gray-400">
                                                        <strong className="text-sm text-gray-700 block mb-2">
                                                            Source {srcData.srcIdx + 1}:
                                                        </strong>
                                                        <div className="leading-relaxed">
                                                            {renderSourceText(srcData)}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                ) : (
                                    <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                                        <p className="text-gray-500">No visualization data available for this view mode. Click the Debug button to see what data is present.</p>
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(JSONLVisualizer));
    </script>
</body>
</html>
